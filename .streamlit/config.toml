[server]
enableStaticServing = true

[[theme.fontFaces]]
family = "Outfit"
url = "static/Outfit-VariableFont_wght.ttf"

[[theme.fontFaces]]
family = "SpaceMono"
url = "static/SpaceMono-Bold.ttf"
style = "normal"
weight = 700

[[theme.fontFaces]]
family = "SpaceMono"
url = "static/SpaceMono-BoldItalic.ttf"
style = "italic"
weight = 700

[[theme.fontFaces]]
family = "SpaceMono"
url = "static/SpaceMono-Italic.ttf"
style = "italic"
weight = 400

[[theme.fontFaces]]
family = "SpaceMono"
url = "static/SpaceMono-Regular.ttf"
style = "normal"
weight = 400

[theme]
primaryColor = "#ff8e32"
backgroundColor = "#fdfdf8"
secondaryBackgroundColor = "#ecebe3"
textColor = "#3d3a2a"
linkColor = "#2a2418"
borderColor = "#e3ddcf"
showWidgetBorder = true
baseRadius = "0.75rem"
buttonRadius = "full"
font = "Outfit"
headingFontWeights = [600,500,500,500,500,500]
headingFontSizes = ["3rem", "2rem"]
codeFont = "SpaceMono"
codeFontSize = ".75rem"
codeBackgroundColor = "#ecebe4"
showSidebarBorder = true
chartCategoricalColors = [
  "#B85F3D",
  "#2E7D68",
  "#7A52B3",
  "#2C78B7",
  "#B6861E",
  "#433D37"
]

[theme.sidebar]
backgroundColor = "#ece3cf"
secondaryBackgroundColor = "#f2efe4"
headingFontSizes = ["1.6rem", "1.4rem", "1.2rem"]
dataframeHeaderBackgroundColor = "#e4e4e0"
borderColor = "#d9d1bd"